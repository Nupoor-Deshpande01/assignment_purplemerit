services:
  - type: web
    name: user-management-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: CLIENT_URL
        value: https://user-management-frontend-placeholder.vercel.app
      - key: MONGO_URI
        sync: false # Must be set securely via MongoDB Atlas URI in the dashboard
